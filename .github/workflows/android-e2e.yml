name: Android App E2E Appium Automation + CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # Run daily at 2:00 AM UTC

permissions:
  contents: write

jobs:
  android-e2e:
    name: Build & E2E Testing
    runs-on: macos-13

    steps:
      # Stage 1: Checkout Repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Stage 2: Setup Java
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Stage 3: Setup Android SDK
      - name: Setup Android SDK Env
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/emulator" >> $GITHUB_PATH

      # Stage 4: Install Android Dependencies
      - name: Install Mobile App Dependencies
        run: |
          cd neurostay-mobile
          npm install

      # Stage 5: Build APK
      - name: Build Android Debug APK
        run: |
          cd neurostay-mobile/android
          chmod +x gradlew
          ./gradlew assembleDebug

      # Stage 6, 7, 8, 9, 10, 11: Start Emulator, Verify Readiness, Install APK, Start Appium, Verify Health, Execute Tests
      - name: Start Emulator & Execute E2E Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu off -no-audio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            # Stage 7: Verify Emulator Readiness
            adb wait-for-device
            adb devices
            
            # Stage 8: Install APK automatically
            adb install neurostay-mobile/android/app/build/outputs/apk/debug/app-debug.apk
            
            # Stage 9: Start Appium Server
            npm install -g appium
            appium driver install uiautomator2
            appium --log-level info > appium.log &
            
            # Stage 10: Verify Appium Health
            echo "Waiting for Appium server to start..."
            npx wait-on http://127.0.0.1:4723/status --timeout 60000 || {
              echo "Appium server failed to start. Logs:"
              cat appium.log
              exit 1
            }
            
            # Stage 11: Execute Appium E2E Tests
            cd automation
            npm install
            npm run test

      # Stage 12, 13: Capture logs and screenshots (Runner handles screenshots, we copy Appium log)
      - name: Copy Appium Server Logs
        if: always()
        run: |
          cp appium.log automation/reports/Logs/appium-server.log || true

      # Stage 18: Upload Artifacts
      - name: Upload Automation Excel Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Automation-Excel-Reports
          path: |
            automation/reports/Excel/Automation_Test_Report.xlsx
            automation/reports/Excel/Passed_Test_Cases.xlsx
            automation/reports/Excel/Failed_Test_Cases.xlsx
            automation/reports/Excel/Execution_Summary.xlsx
          retention-days: 30

      - name: Upload Automation HTML & JSON Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Automation-HTML-JSON-Reports
          path: |
            automation/reports/HTML/
            automation/reports/JSON/
          retention-days: 30

      - name: Upload Automation Screenshots & Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Automation-Screenshots-Logs
          path: |
            automation/reports/Screenshots/
            automation/reports/Logs/
          retention-days: 30

      # Stage 19, 20: Publish Reports to GitHub Pages & Update Historical Reports
      - name: Deploy Reports to GitHub Pages
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Clone current gh-pages branch, create it if it doesn't exist
          git clone --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages-dir || {
            mkdir gh-pages-dir
            cd gh-pages-dir
            git init
            git checkout -b gh-pages
            cd ..
          }
          
          # Prep folders
          mkdir -p gh-pages-dir/reports/latest
          mkdir -p gh-pages-dir/reports/history/build-${{ github.run_number }}
          
          # Copy previous latest to history/build-N
          if [ -d gh-pages-dir/reports/latest ] && [ "$(ls -A gh-pages-dir/reports/latest)" ]; then
            cp -r gh-pages-dir/reports/latest/* gh-pages-dir/reports/history/build-${{ github.run_number }}/ || true
          fi
          
          # Copy new reports to latest/ (Excel, HTML, JSON, Screenshots, Logs)
          cp -r automation/reports/* gh-pages-dir/reports/latest/
          
          # Push back to gh-pages branch
          cd gh-pages-dir
          git add .
          git commit -m "Deploy Appium Reports for build ${{ github.run_number }}" || true
          git push origin gh-pages || true

      # Stage 21: Publish GitHub Action Summary
      - name: Publish Action Summary
        if: always()
        run: |
          # Lowercase owner and repo for correct URLs
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          
          if [ -f automation/reports/Summary/summary.md ]; then
            echo "## 🔗 Live Execution Reports" >> $GITHUB_STEP_SUMMARY
            echo "You can view the published interactive reports here:" >> $GITHUB_STEP_SUMMARY
            echo "- 📊 **Interactive Dashboard**: https://${OWNER}.github.io/${REPO}/reports/latest/HTML/dashboard.html" >> $GITHUB_STEP_SUMMARY
            echo "- 🔍 **Interactive Test Log**: https://${OWNER}.github.io/${REPO}/reports/latest/HTML/execution-report.html" >> $GITHUB_STEP_SUMMARY
            echo "- 📈 **Historical Trends**: https://${OWNER}.github.io/${REPO}/reports/latest/HTML/trends.html" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat automation/reports/Summary/summary.md >> $GITHUB_STEP_SUMMARY
          fi
