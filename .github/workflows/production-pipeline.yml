name: Live Production CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy-test:
    name: Build, Deploy & Verify Live Stack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            frontend/package.json
            backend/package.json
            automation/package.json
            testing/package.json

      - name: Install All Node Dependencies
        run: |
          echo "Installing Backend dependencies..."
          cd backend && npm install
          echo "Installing Frontend dependencies..."
          cd ../frontend && npm install
          echo "Installing Testing dependencies..."
          cd ../testing && npm install
          echo "Installing Automation dependencies..."
          cd ../automation && npm install
        shell: bash

      - name: Build Backend Application
        run: |
          cd backend
          npm run build
        shell: bash

      - name: Build Frontend Application
        run: |
          cd frontend
          npm run build -- --base=/pddtesting/
        env:
          VITE_API_URL: https://neurostay-ai.onrender.com/api
        shell: bash

      - name: Deploy Frontend to GitHub Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Clone current gh-pages branch or create if not exists
          git clone --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages-dir || {
            mkdir gh-pages-dir
            cd gh-pages-dir
            git init
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git checkout -b gh-pages
            cd ..
          }
          
          # Clean previous frontend code
          rm -rf gh-pages-dir/*
          
          # Copy built frontend assets
          cp -r frontend/dist/* gh-pages-dir/
          
          # Commit and push
          cd gh-pages-dir
          git add .
          git commit -m "Automated Live Production Deployment [skip ci]" || true
          git push origin gh-pages || true
        shell: bash

      - name: Wait for Frontend Deployment Warmup
        run: sleep 15
        shell: bash

      - name: Verify Live Deployment Health
        run: |
          echo "Verifying live Frontend health at https://karthik17-17.github.io/pddtesting/ ..."
          curl -I -s -f https://karthik17-17.github.io/pddtesting/ || { echo "Frontend Health Check Failed"; exit 1; }
          
          echo "Verifying live Backend health at https://neurostay-ai.onrender.com/ ..."
          curl -I -s -f https://neurostay-ai.onrender.com/ || { echo "Backend Health Check Failed (Offline or Warming Up)"; exit 0; }
        shell: bash

      - name: Run E2E Selenium Tests
        run: |
          cd testing
          npm run test:selenium
        env:
          WEB_URL: https://karthik17-17.github.io/pddtesting/
          MOBILE_URL: https://neurostay-ai.onrender.com

      - name: Upload Test Reports Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-production-test-reports
          path: |
            testing/selenium-test-report.xlsx
            testing/selenium-summary.md
          retention-days: 14

  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK Env
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Install Expo / Mobile Dependencies
        run: |
          cd neurostay-mobile
          npm install

      - name: Build Android Debug APK
        run: |
          cd neurostay-mobile/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neurostay-mobile-apk
          path: neurostay-mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
