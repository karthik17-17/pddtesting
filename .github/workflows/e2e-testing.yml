name: NeuroStay AI E2E Testing

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Run Selenium E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend/package.json
            frontend/package.json
            testing/package.json

      - name: Install Google Chrome & ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Backend Dependencies & Start Server
        run: |
          cd backend
          npm install
          # Start backend server in the background
          npm run dev &
          echo "Waiting for Backend Server to be ready..."
          npx wait-on http://localhost:5000
        env:
          PORT: 5000
          MONGO_URI: "mongodb://localhost:27017/neurostay"
          JWT_SECRET: "testing-secret-key-12345"

      - name: Install Frontend Dependencies & Start App
        run: |
          cd frontend
          npm install
          # Run dev server in background
          npm run dev &
          echo "Waiting for Frontend Server to be ready..."
          npx wait-on http://localhost:5173

      - name: Install E2E Testing Suite Dependencies
        run: |
          cd testing
          npm install

      - name: Run E2E Test Suite
        run: |
          cd testing
          node run-tests.js
        env:
          WEB_URL: "http://localhost:5173"
          MOBILE_URL: "http://localhost:8081"

      - name: Upload Test Report (Excel)
        uses: actions/upload-artifact@v4
        with:
          name: E2E-Test-Analysis-Report
          path: testing/test-analysis-report.xlsx
          if-no-files-found: error

      - name: Publish Test Summary
        if: always()
        run: |
          if [ -f testing/summary.md ]; then
            cat testing/summary.md >> $GITHUB_STEP_SUMMARY
          else
            echo "Testing summary file not found." >> $GITHUB_STEP_SUMMARY
          fi
