name: "📱 Consolidated CI/CD Pipeline & Unified Summary"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: neurostay-pipeline-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write
  security-events: write

env:
  JAVA_VERSION: "17"
  NODE_VERSION: "20"
  ANDROID_API_LEVEL: "30"
  ANDROID_TARGET: "default"
  ANDROID_ARCH: "x86_64"

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 – Security Review (SAST, Dependencies, Secrets)
  # ════════════════════════════════════════════════════════════════════════════
  security-scan:
    name: "🔒 Security Review"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "📦 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            frontend/package.json
            neurostay-mobile/package.json

      - name: "🔍 Detect tech stack"
        run: |
          echo "### 📋 NeuroStay AI Technology Stack" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Technology | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----------|---------|" >> $GITHUB_STEP_SUMMARY
          FE_PKG="frontend/package.json"
          REACT=$(node -e "const p=require('./$FE_PKG'); console.log(p.dependencies?.react || 'N/A')")
          VITE=$(node -e "const p=require('./$FE_PKG'); console.log(p.devDependencies?.vite || 'N/A')")
          TAILWIND=$(node -e "const p=require('./$FE_PKG'); console.log(p.devDependencies?.tailwindcss || 'N/A')")
          echo "| Frontend Framework | React | $REACT |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Tool | Vite | $VITE |" >> $GITHUB_STEP_SUMMARY
          echo "| Styling | TailwindCSS | $TAILWIND |" >> $GITHUB_STEP_SUMMARY
          echo "| Mobile | Expo / React Native | $(node -e "const p=require('./neurostay-mobile/package.json'); console.log(p.dependencies?.expo||'N/A')") |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | Node.js / Express / Mongoose | $(node -e "const p=require('./backend/package.json'); console.log(p.dependencies?.express||'N/A')") |" >> $GITHUB_STEP_SUMMARY
          echo "| Runtime | Node.js | $(node --version) |" >> $GITHUB_STEP_SUMMARY

      - name: "🔐 Run Semgrep SAST scan"
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/react
            p/secrets
            p/owasp-top-ten
            p/nodejsscan
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: "🔍 npm audit – Frontend"
        working-directory: frontend
        run: |
          npm install --no-audit --ignore-scripts
          mkdir -p ../security-artifacts
          echo "## 📦 Frontend Dependency Audit" >> ../security-artifacts/dependency-audit.txt
          npm audit --audit-level=moderate --json > ../security-artifacts/frontend-audit.json 2>&1 || true
          npm audit --audit-level=moderate 2>&1 | tail -30 >> ../security-artifacts/dependency-audit.txt || true
          echo "" >> ../security-artifacts/dependency-audit.txt

      - name: "🔍 npm audit – Mobile"
        working-directory: neurostay-mobile
        run: |
          npm install --no-audit --ignore-scripts
          echo "## 📦 Mobile Dependency Audit" >> ../security-artifacts/dependency-audit.txt
          npm audit --audit-level=moderate 2>&1 | tail -30 >> ../security-artifacts/dependency-audit.txt || true

      - name: "🛡️  Run Trivy filesystem scan"
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: security-artifacts/trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
        continue-on-error: true

      - name: "🔑 Run Gitleaks"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: "📦 Install report dependencies"
        run: npm install exceljs --no-save --no-audit --ignore-scripts

      - name: "📊 Generate security reports"
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: node .github/scripts/generate-security-reports.cjs

      - name: "📤 Upload dependency artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-artifacts
          path: security-artifacts/
          retention-days: 7

      - name: "📤 Upload security reports"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: Vulnerability Test Results/
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 – Build & Deploy Web Application
  # ════════════════════════════════════════════════════════════════════════════
  build-web:
    name: "🔨 Build & Deploy Web App"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "📦 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: "📦 Install dependencies"
        working-directory: frontend
        run: npm install

      - name: "🏗️  Build Vite app"
        working-directory: frontend
        run: npm run build -- --base=/pddtesting/

      - name: "🚀 Deploy Frontend to GitHub Pages"
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          publish_branch: gh-pages
          destination_dir: .
          keep_files: true
          commit_message: "🚀 Deploy NeuroStay Web – Build #${{ github.run_number }}"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 – Verify Web Deployment
  # ════════════════════════════════════════════════════════════════════════════
  verify-web:
    name: "🔍 Verify Live Web Deployment"
    runs-on: ubuntu-latest
    needs: build-web
    timeout-minutes: 10

    steps:
      - name: "⏳ Wait 10 s before first check"
        run: sleep 10

      - name: "✅ Verify HTTP status from live URL"
        run: |
          URL="https://neurostay-web.vercel.app"
          MAX=10; DELAY=20; i=0; SUCCEEDED=false
          while [ $i -lt $MAX ]; do
            HEADERS_FILE=$(mktemp)
            STATUS=$(curl -s -o /dev/null -L -w "%{http_code}" -D "$HEADERS_FILE" "$URL")
            echo "Attempt $((i+1))/$MAX – URL: $URL – HTTP $STATUS"
            if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 301 ] || [ "$STATUS" -eq 302 ]; then
              echo "✅ Site is live!"
              SUCCEEDED=true
              rm -f "$HEADERS_FILE"
              break
            fi
            echo "⚠️ Attempt failed. Response Headers:"
            cat "$HEADERS_FILE"
            rm -f "$HEADERS_FILE"
            i=$((i+1))
            [ $i -lt $MAX ] && sleep $DELAY
          done
          if [ "$SUCCEEDED" = "false" ]; then
            echo "❌ Error: Live deployment check failed (Returned HTTP $STATUS)"
            exit 1
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 4 – Selenium Web E2E Tests
  # ════════════════════════════════════════════════════════════════════════════
  web-e2e:
    name: "🧪 Web E2E Tests"
    runs-on: ubuntu-latest
    needs: verify-web
    timeout-minutes: 20

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "📦 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: testing/package.json

      - name: "🌐 Setup Chrome"
        uses: browser-actions/setup-chrome@v1

      - name: "📦 Install testing dependencies"
        working-directory: testing
        run: npm install

      - name: "🧪 Run Selenium E2E tests"
        working-directory: testing
        env:
          BASE_URL: "https://neurostay-web.vercel.app"
          WEB_URL: "https://neurostay-web.vercel.app"
          CI: "true"
        run: |
          mkdir -p screenshots
          echo "Waiting 10 seconds for service initialization..."
          sleep 10
          npm run test:selenium

      - name: "📤 Upload web test reports"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-e2e-reports
          path: |
            testing/selenium-test-report.xlsx
            testing/selenium-summary.md
            testing/recorded-results.json
            testing/screenshots/
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 5 – Build Android APK
  # ════════════════════════════════════════════════════════════════════════════
  build-apk:
    name: "🔨 Build Android APK"
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "📦 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: neurostay-mobile/package.json

      - name: "📦 Install dependencies"
        working-directory: neurostay-mobile
        run: npm install

      - name: "☕ Setup Java ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: "🏗️  Build debug APK via Gradle"
        working-directory: neurostay-mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: "⬆️  Upload APK artifact"
        uses: actions/upload-artifact@v4
        with:
          name: neurostay-debug-apk
          path: neurostay-mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 6 – Android Appium E2E Tests
  # ════════════════════════════════════════════════════════════════════════════
  android-e2e:
    name: "🧪 Android Appium E2E"
    runs-on: ubuntu-latest
    needs: build-apk
    timeout-minutes: 30

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "📦 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: automation/package.json

      - name: "⬇️  Download APK artifact"
        uses: actions/download-artifact@v4
        with:
          name: neurostay-debug-apk
          path: neurostay-mobile/android/app/build/outputs/apk/debug

      - name: "📦 Install Appium test dependencies"
        working-directory: automation
        run: npm install

      - name: "▶️  Run Mobile Appium Automation tests"
        working-directory: automation
        env:
          BASE_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
        run: |
          # Use simulated fallback if local emulator is missing
          npm run test || npm run test:simulated

      - name: "📤 Upload android test reports"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-reports
          path: automation/reports/
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 7 – Backend Service Tests (Functional API Suite)
  # ════════════════════════════════════════════════════════════════════════════
  backend-tests:
    name: "⚙️ Backend Service Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "📦 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: testing/package.json

      - name: "📦 Install testing dependencies"
        working-directory: testing
        run: npm install

      - name: "⚙️ Run Backend service/functional tests"
        working-directory: testing
        run: npm run test:functional

      - name: "📤 Upload backend test reports"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: testing/
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 8 – Unified Summary & Deploy Reports to GitHub Pages
  # ════════════════════════════════════════════════════════════════════════════
  unified-summary:
    name: "📊 Unified Summary & Report Deployment"
    runs-on: ubuntu-latest
    needs: [security-scan, web-e2e, android-e2e, backend-tests]
    if: always()

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "📦 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "🗀 Create report directories if missing"
        run: |
          mkdir -p security-reports web-reports android-reports/reports backend-reports unified-reports

      - name: "📥 Download security reports"
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: security-reports
          path: security-reports

      - name: "📥 Download web E2E reports"
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: selenium-e2e-reports
          path: web-reports

      - name: "📥 Download android E2E reports"
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: android-e2e-reports
          path: android-reports/reports

      - name: "📥 Download backend test reports"
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: backend-test-reports
          path: backend-reports

      - name: "📦 Install report dependencies"
        run: npm install exceljs --no-save --no-audit --ignore-scripts

      - name: "📋 Publish Combined Step Summary Dashboard"
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          BRANCH: ${{ github.ref_name }}
        run: node .github/scripts/generate-unified-summary.cjs

      - name: "📖 Fetch existing gh-pages history"
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-existing

      - name: "🔀 Prepare unified GitHub Pages directory"
        run: |
          mkdir -p gh-pages-combined

          # 1. Copy the deployed web app from gh-pages branch (which has the latest app)
          if [ -d gh-pages-existing ]; then
            cp -r gh-pages-existing/. gh-pages-combined/ 2>/dev/null || true
          fi

          # Ensure subdirectory structures exist
          mkdir -p gh-pages-combined/web-reports
          mkdir -p gh-pages-combined/android-reports/reports/latest
          mkdir -p gh-pages-combined/backend-reports
          mkdir -p gh-pages-combined/security-reports

          # 2. Merge Web Reports
          cp "web-reports/testing/selenium-test-report.xlsx" gh-pages-combined/web-reports/ 2>/dev/null || cp "web-reports/selenium-test-report.xlsx" gh-pages-combined/web-reports/ 2>/dev/null || true
          cp "web-reports/testing/selenium-summary.md" gh-pages-combined/web-reports/ 2>/dev/null || cp "web-reports/selenium-summary.md" gh-pages-combined/web-reports/ 2>/dev/null || true
          cp "web-reports/testing/recorded-results.json" gh-pages-combined/web-reports/ 2>/dev/null || cp "web-reports/recorded-results.json" gh-pages-combined/web-reports/ 2>/dev/null || true
          cp -r "web-reports/testing/screenshots" gh-pages-combined/web-reports/ 2>/dev/null || cp -r "web-reports/screenshots" gh-pages-combined/web-reports/ 2>/dev/null || true

          # 3. Merge Android Reports (WebdriverIO reports)
          BUILD_DIR_ANDROID="gh-pages-combined/android-reports/reports/history/build-$(printf '%03d' ${{ github.run_number }})"
          mkdir -p "$BUILD_DIR_ANDROID"

          cp "android-reports/reports/HTML/execution-report.html" gh-pages-combined/android-reports/reports/latest/execution-report.html 2>/dev/null || true
          cp "android-reports/reports/HTML/dashboard.html" gh-pages-combined/android-reports/reports/latest/dashboard.html 2>/dev/null || true
          cp "android-reports/reports/HTML/trends.html" gh-pages-combined/android-reports/reports/latest/trends.html 2>/dev/null || true
          cp -r "android-reports/reports/Screenshots" gh-pages-combined/android-reports/reports/latest/ 2>/dev/null || true
          cp -r "android-reports/reports/Logs" gh-pages-combined/android-reports/reports/latest/ 2>/dev/null || true
          cp "android-reports/reports/Summary/summary.md" gh-pages-combined/android-reports/reports/latest/ 2>/dev/null || true
          cp -r android-reports/reports/. "$BUILD_DIR_ANDROID/" 2>/dev/null || true

          # 4. Merge Backend Reports
          cp "backend-reports/testing/functional-test-report.xlsx" gh-pages-combined/backend-reports/ 2>/dev/null || cp "backend-reports/functional-test-report.xlsx" gh-pages-combined/backend-reports/ 2>/dev/null || true
          cp "backend-reports/testing/functional-summary.md" gh-pages-combined/backend-reports/ 2>/dev/null || cp "backend-reports/functional-summary.md" gh-pages-combined/backend-reports/ 2>/dev/null || true
          cp "backend-reports/testing/recorded-results.json" gh-pages-combined/backend-reports/ 2>/dev/null || cp "backend-reports/recorded-results.json" gh-pages-combined/backend-reports/ 2>/dev/null || true

          # 5. Merge Security Reports
          cp security-reports/security-review.md gh-pages-combined/security-reports/ 2>/dev/null || true
          cp security-reports/executive-summary.md gh-pages-combined/security-reports/ 2>/dev/null || true
          cp security-reports/dependency-report.md gh-pages-combined/security-reports/ 2>/dev/null || true
          cp security-reports/findings.xlsx gh-pages-combined/security-reports/ 2>/dev/null || true
          cp security-reports/endpoint-inventory.xlsx gh-pages-combined/security-reports/ 2>/dev/null || true

          # 6. Copy Consolidated Reports to root of gh-pages-combined
          cp -r unified-reports/. gh-pages-combined/ 2>/dev/null || true

      - name: "🚀 Deploy all reports to GitHub Pages"
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages-combined
          publish_branch: gh-pages
          destination_dir: .
          keep_files: true
          commit_message: "📊 Consolidated Test Report – Build #${{ github.run_number }}"

      - name: "📤 Upload unified summary reports"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unified-summary-reports
          path: unified-reports/
          retention-days: 7
