name: Deploy and E2E Test Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'pages-deploy'
  cancel-in-progress: false

jobs:
  deploy-and-test:
    name: Build, Deploy, and Live E2E E2E Testing
    runs-on: ubuntu-latest

    steps:
      # Stage 1: Repository Checkout
      - name: Stage 1 - Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Stage 2: Dependency Installation
      - name: Stage 2 - Install Dependencies (Node.js)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            frontend/package.json
            automation/package.json
      - name: Stage 2 - Install Frontend & Automation Dependencies
        run: |
          echo "Installing Frontend dependencies..."
          cd frontend
          npm install
          echo "Installing Automation framework dependencies..."
          cd ../automation
          npm install
        shell: bash

      # Stage 3: Build Application
      - name: Stage 3 - Build Frontend Application
        run: |
          cd frontend
          npm run build -- --base=/pddtesting/
        shell: bash

      # Stage 4: Static Analysis
      - name: Stage 4 - Run Static Analysis
        run: |
          cd frontend
          npm run lint || echo "Static analysis (linting) warnings detected. Proceeding..."
        shell: bash

      # Stage 5: Deploy to GitHub Pages
      - name: Stage 5 - Deploy Frontend to GitHub Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Clone current gh-pages branch, create it if it doesn't exist
          git clone --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages-dir || {
            mkdir gh-pages-dir
            cd gh-pages-dir
            git init
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git checkout -b gh-pages
            cd ..
          }
          
          # Backup reports folder if it exists in gh-pages-dir
          if [ -d gh-pages-dir/reports ]; then
            echo "Backing up reports history..."
            mv gh-pages-dir/reports ./reports-backup
          fi
          
          # Remove everything in gh-pages-dir to clear old frontend code
          rm -rf gh-pages-dir/*
          
          # Copy built frontend assets
          cp -r frontend/dist/* gh-pages-dir/
          
          # Restore reports folder
          if [ -d ./reports-backup ]; then
            echo "Restoring reports history..."
            mv ./reports-backup gh-pages-dir/reports
          fi
          
          # Commit and push changes
          cd gh-pages-dir
          git add .
          git commit -m "Deploy Frontend for build ${{ github.run_number }} [skip ci]" || true
          git push origin gh-pages || true
        shell: bash

      # Stage 6: Wait for Deployment
      - name: Stage 6 - Wait for Pages Deployment
        run: |
          echo "Waiting 30 seconds for GitHub Pages deployment to become active..."
          sleep 30
        shell: bash

      # Stage 7: Deployment Verification
      - name: Stage 7 - Deployment Verification
        run: |
          # Poll the deployment URL up to 20 times (5 minutes max)
          MAX_ATTEMPTS=20
          ATTEMPT=1
          SUCCESS=false
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Attempt $ATTEMPT of $MAX_ATTEMPTS: Fetching main page..."
            RESPONSE=$(curl -s -w "%{http_code}" -o main_page.html https://karthik17-17.github.io/pddtesting/ || echo "000")
            if [ "$RESPONSE" -eq 200 ]; then
              echo "Main page loaded successfully (HTTP 200) on attempt $ATTEMPT."
              SUCCESS=true
              break
            else
              echo "HTTP $RESPONSE returned. Waiting 15 seconds before retry..."
              sleep 15
              ATTEMPT=$((ATTEMPT+1))
            fi
          done
          
          if [ "$SUCCESS" != "true" ]; then
            echo "Error: Live URL failed to return HTTP 200 after $MAX_ATTEMPTS attempts."
            cat main_page.html || true
            exit 1
          fi
          
          # Match asset files (e.g. assets/index-hash.js)
          JS_PATH=$(grep -oE 'assets/index-[0-9a-zA-Z_-]+\.js' main_page.html | head -n 1)
          CSS_PATH=$(grep -oE 'assets/index-[0-9a-zA-Z_-]+\.css' main_page.html | head -n 1)
          
          if [ -n "$JS_PATH" ]; then
            echo "Found JS asset: $JS_PATH"
            JS_RESPONSE=$(curl -s -w "%{http_code}" -o /dev/null https://karthik17-17.github.io/pddtesting/$JS_PATH)
            if [ "$JS_RESPONSE" -ne 200 ]; then
              echo "Error: JS asset returned HTTP $JS_RESPONSE"
              exit 1
            fi
            echo "JS asset loaded successfully (HTTP 200)."
          else
            echo "Warning: JS asset path not found in index.html"
          fi
          
          if [ -n "$CSS_PATH" ]; then
            echo "Found CSS asset: $CSS_PATH"
            CSS_RESPONSE=$(curl -s -w "%{http_code}" -o /dev/null https://karthik17-17.github.io/pddtesting/$CSS_PATH)
            if [ "$CSS_RESPONSE" -ne 200 ]; then
              echo "Error: CSS asset returned HTTP $CSS_RESPONSE"
              exit 1
            fi
            echo "CSS asset loaded successfully (HTTP 200)."
          else
            echo "Warning: CSS asset path not found in index.html"
          fi
        shell: bash

      # Stage 8: Run Selenium E2E Tests
      # Stage 9: Generate Reports
      # Stage 10: Generate Excel Reports
      - name: Stage 8, 9, 10 - Run Selenium E2E Tests and Generate Reports
        run: |
          cd automation
          npm run build
          npm test
        env:
          BASE_URL: https://karthik17-17.github.io/pddtesting/

      # Consolidate results for artifact uploading
      - name: Consolidate Test Evidence
        if: always()
        run: |
          mkdir -p "Test Results"
          cp -r automation/reports/Excel "Test Results/"
          cp -r automation/reports/HTML "Test Results/"
          cp -r automation/reports/JSON "Test Results/"
          cp -r automation/reports/Summary "Test Results/"
          cp -r automation/reports/Screenshots "Test Results/screenshots" || true
          cp -r automation/reports/Logs "Test Results/logs" || true
        shell: bash

      # Stage 11: Upload Artifacts
      - name: Stage 11 - Upload Automation Test Reports Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-E2E-Reports-Build-${{ github.run_number }}
          path: Test Results/
          retention-days: 30

      # Stage 12: Publish Summary
      - name: Stage 12 - Publish GitHub Action Summary
        if: always()
        run: |
          # Lowercase owner and repo for correct URLs
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          
          if [ -f automation/reports/Summary/summary.md ]; then
            echo "## 🔗 Live Execution Reports" >> $GITHUB_STEP_SUMMARY
            echo "You can view the published interactive reports here:" >> $GITHUB_STEP_SUMMARY
            echo "- 📊 **Interactive Dashboard**: https://${OWNER}.github.io/${REPO}/reports/latest/HTML/dashboard.html" >> $GITHUB_STEP_SUMMARY
            echo "- 🔍 **Interactive Test Log**: https://${OWNER}.github.io/${REPO}/reports/latest/HTML/execution-report.html" >> $GITHUB_STEP_SUMMARY
            echo "- 📈 **Historical Trends**: https://${OWNER}.github.io/${REPO}/reports/latest/HTML/trends.html" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat automation/reports/Summary/summary.md >> $GITHUB_STEP_SUMMARY
          fi
        shell: bash

      # Stage 13: Store Historical Results
      - name: Stage 13 - Store Historical Results
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Clone current gh-pages branch
          git clone --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages-reports || exit 1
          
          # Prep folders
          mkdir -p gh-pages-reports/reports/latest
          mkdir -p gh-pages-reports/reports/history/build-${{ github.run_number }}
          
          # Archive previous latest to history/build-N
          if [ -d gh-pages-reports/reports/latest ] && [ "$(ls -A gh-pages-reports/reports/latest)" ]; then
            cp -r gh-pages-reports/reports/latest/* gh-pages-reports/reports/history/build-${{ github.run_number }}/ || true
          fi
          
          # Copy new reports to latest/ (Excel, HTML, JSON, Screenshots, Logs) if they exist
          if [ -d automation/reports ] && [ "$(ls -A automation/reports)" ]; then
            cp -r automation/reports/* gh-pages-reports/reports/latest/
          fi
          
          # Push back to gh-pages branch
          cd gh-pages-reports
          git add .
          git commit -m "Deploy Test Reports for build ${{ github.run_number }} [skip ci]" || true
          git push origin gh-pages || true
        shell: bash
